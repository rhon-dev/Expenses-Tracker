<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expense.log</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --bg:      #0a0a0f;
    --surface: #111118;
    --border:  #1e1e2e;
    --accent:  #e8ff48;
    --accent2: #ff6b6b;
    --text:    #e2e2ec;
    --muted:   #5a5a7a;
    --serif:   'Playfair Display', Georgia, serif;
    --mono:    'JetBrains Mono', monospace;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 15px;
    line-height: 1.7;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0; z-index: -1;
    background-image:
      linear-gradient(rgba(232,255,72,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(232,255,72,.03) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.25rem 2.5rem;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
    background: rgba(10,10,15,.88);
    backdrop-filter: blur(12px);
  }

  .nav-logo {
    font-family: var(--serif); font-size: 1.4rem; font-weight: 900;
    color: var(--accent); text-decoration: none; letter-spacing: -0.5px;
  }
  .nav-logo span { color: var(--text); }

  .nav-links { display: flex; gap: 2rem; align-items: center; }

  .nav-tab {
    color: var(--muted); font-size: .78rem; letter-spacing: .12em;
    text-transform: uppercase; cursor: pointer; border: none;
    background: none; font-family: var(--mono); transition: color .2s; padding: 0;
  }
  .nav-tab:hover, .nav-tab.active { color: var(--accent); }

  .btn-new {
    background: var(--accent); color: #000; padding: .45rem 1.1rem;
    font-weight: 500; border-radius: 2px; transition: opacity .2s, transform .1s;
    font-size: .78rem; letter-spacing: .12em; text-transform: uppercase;
    border: none; font-family: var(--mono); cursor: pointer;
  }
  .btn-new:hover { opacity: .85; transform: translateY(-1px); }

  main { max-width: 900px; margin: 0 auto; padding: 3rem 2rem 6rem; }

  .page-header {
    margin-bottom: 3rem; padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: flex-end;
  }
  .page-header h1 {
    font-family: var(--serif); font-size: clamp(2rem, 5vw, 3rem);
    font-weight: 900; line-height: 1.1; letter-spacing: -1px;
  }
  .page-header h1 em { font-style: normal; color: var(--accent); }
  .page-header p { color: var(--muted); margin-top: .4rem; font-size: .8rem; }
  .header-total-label { font-size: .68rem; letter-spacing: .15em; text-transform: uppercase; color: var(--muted); margin-bottom: .3rem; }
  .header-total-amount { font-family: var(--serif); font-size: 2rem; font-weight: 900; color: var(--accent); transition: all .3s; text-align: right; }

  .view { display: none; }
  .view.active { display: block; animation: fadeUp .3s ease both; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

  .section-label {
    font-size: .68rem; letter-spacing: .15em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 1rem; padding-bottom: .5rem;
    border-bottom: 1px solid var(--border);
  }

  .breakdown-list { display: flex; flex-direction: column; margin-bottom: 2.5rem; }
  .breakdown-row {
    display: flex; align-items: center; gap: 1rem;
    padding: 1rem 1.5rem;
    background: var(--surface); border: 1px solid var(--border); border-top: none;
    transition: border-color .2s;
  }
  .breakdown-row:first-child { border-top: 1px solid var(--border); }
  .breakdown-row:hover { border-color: var(--accent); z-index: 1; position: relative; }
  .breakdown-cat { font-size: .72rem; letter-spacing: .1em; text-transform: uppercase; width: 120px; flex-shrink: 0; }
  .breakdown-bar-wrap { flex: 1; height: 3px; background: var(--border); }
  .breakdown-bar { height: 3px; transition: width .9s cubic-bezier(.16,1,.3,1); width: 0; }
  .breakdown-pct { font-size: .72rem; color: var(--muted); width: 36px; text-align: right; flex-shrink: 0; }
  .breakdown-amt { font-size: .85rem; font-weight: 500; width: 72px; text-align: right; flex-shrink: 0; }

  .bar-Food { background: #fbbf24; } .cat-Food { color: #fbbf24; }
  .bar-Transport { background: #22d3ee; } .cat-Transport { color: #22d3ee; }
  .bar-Shopping { background: #c084fc; } .cat-Shopping { color: #c084fc; }
  .bar-Entertainment { background: var(--accent); } .cat-Entertainment { color: var(--accent); }
  .bar-Health { background: var(--accent2); } .cat-Health { color: var(--accent2); }
  .bar-Bills { background: #60a5fa; } .cat-Bills { color: #60a5fa; }
  .bar-Other { background: var(--muted); } .cat-Other { color: var(--muted); }

  .filter-row { display: flex; gap: .5rem; flex-wrap: wrap; margin-bottom: 1rem; }
  .chip {
    font-size: .68rem; letter-spacing: .12em; text-transform: uppercase;
    color: var(--muted); border: 1px solid var(--border); background: none;
    padding: .3rem .75rem; cursor: pointer; font-family: var(--mono);
    transition: border-color .2s, color .2s; border-radius: 2px;
  }
  .chip:hover { border-color: var(--accent); color: var(--accent); }
  .chip.active { border-color: var(--accent); color: var(--accent); background: rgba(232,255,72,.06); }

  .tx-list { display: flex; flex-direction: column; }
  .tx-row {
    display: flex; align-items: center; gap: 1.25rem;
    padding: 1rem 1.5rem; background: var(--surface);
    border: 1px solid var(--border); border-top: none;
    transition: border-color .2s, transform .15s; position: relative;
  }
  .tx-row:first-child { border-top: 1px solid var(--border); }
  .tx-row:hover { border-color: var(--accent); transform: translateX(4px); z-index: 1; }
  .tx-emoji { font-size: 1rem; width: 20px; flex-shrink: 0; text-align: center; }
  .tx-info { flex: 1; min-width: 0; }
  .tx-desc { font-size: .88rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tx-meta { font-size: .7rem; color: var(--muted); margin-top: .1rem; letter-spacing: .06em; }
  .tx-right { text-align: right; flex-shrink: 0; }
  .tx-amount { font-size: .9rem; font-weight: 500; }
  .tx-date { font-size: .7rem; color: var(--muted); }
  .del-btn {
    opacity: 0; background: none; border: 1px solid var(--border); color: var(--muted);
    font-family: var(--mono); font-size: .68rem; padding: .2rem .6rem;
    cursor: pointer; letter-spacing: .06em;
    transition: border-color .2s, color .2s, opacity .15s; flex-shrink: 0;
  }
  .tx-row:hover .del-btn { opacity: 1; }
  .del-btn:hover { border-color: var(--accent2); color: var(--accent2); }

  .form-card { background: var(--surface); border: 1px solid var(--border); padding: 2.5rem; }
  .form-card h2 {
    font-family: var(--serif); font-size: 1.6rem; font-weight: 900;
    letter-spacing: -.5px; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border);
  }
  .form-card h2 em { font-style: normal; color: var(--accent); }
  .form-group { margin-bottom: 1.5rem; }
  .form-group label {
    display: block; font-size: .68rem; letter-spacing: .15em;
    text-transform: uppercase; color: var(--muted); margin-bottom: .5rem;
  }
  .form-input {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    color: var(--text); font-family: var(--mono); font-size: .88rem;
    padding: .75rem 1rem; outline: none; transition: border-color .2s; border-radius: 2px;
  }
  .form-input:focus { border-color: var(--accent); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .cat-grid { display: flex; flex-wrap: wrap; gap: .5rem; }
  .cat-btn {
    font-size: .68rem; letter-spacing: .1em; text-transform: uppercase;
    color: var(--muted); border: 1px solid var(--border); background: none;
    padding: .35rem .85rem; cursor: pointer; font-family: var(--mono);
    transition: border-color .2s, color .2s; border-radius: 2px;
  }
  .cat-btn:hover { border-color: var(--accent); color: var(--accent); }
  .cat-btn.selected { border-color: var(--accent); color: var(--accent); background: rgba(232,255,72,.06); }
  .form-actions { display: flex; gap: 1.5rem; align-items: center; margin-top: 2rem; }
  .btn-submit {
    background: var(--accent); color: #000; border: none; font-family: var(--mono);
    font-size: .78rem; font-weight: 600; letter-spacing: .1em; text-transform: uppercase;
    padding: .75rem 2rem; cursor: pointer; border-radius: 2px;
    transition: opacity .2s, transform .1s;
  }
  .btn-submit:hover { opacity: .85; transform: translateY(-1px); }
  .btn-cancel {
    color: var(--muted); font-size: .78rem; letter-spacing: .08em; cursor: pointer;
    background: none; border: none; font-family: var(--mono); transition: color .2s;
  }
  .btn-cancel:hover { color: var(--text); }

  .p-header {
    background: var(--surface); border: 1px solid var(--border);
    padding: 2.5rem; margin-bottom: 1.5px; position: relative; overflow: hidden;
  }
  .p-header::before {
    content: ''; position: absolute; top: 0; left: 0;
    width: 4px; height: 100%; background: var(--accent);
  }
  .p-tag {
    display: inline-block; font-size: .65rem; letter-spacing: .15em;
    text-transform: uppercase; color: #000; background: var(--accent);
    padding: .15rem .6rem; font-weight: 600; margin-bottom: 1rem;
  }
  .p-icon { font-size: 2.5rem; margin-bottom: .75rem; display: block; }
  .p-title { font-family: var(--serif); font-size: clamp(1.8rem, 4vw, 2.5rem); font-weight: 900; letter-spacing: -.5px; margin-bottom: .75rem; }
  .p-desc { color: var(--muted); font-size: .85rem; line-height: 1.7; }
  .p-traits { display: flex; flex-wrap: wrap; gap: .5rem; margin-top: 1.25rem; }
  .p-trait {
    font-size: .65rem; letter-spacing: .12em; text-transform: uppercase;
    border: 1px solid var(--accent); color: var(--accent); padding: .2rem .65rem;
    background: rgba(232,255,72,.06);
  }

  .insight-card {
    background: var(--surface); border: 1px solid var(--border);
    border-left: 4px solid var(--accent); padding: 1.5rem 2rem; margin-bottom: 1.5px;
  }
  .insight-label { font-size: .65rem; letter-spacing: .15em; text-transform: uppercase; color: var(--muted); margin-bottom: .6rem; }
  .insight-text { font-size: .88rem; color: #b0b0c8; line-height: 1.8; font-style: italic; }

  .tips-card { background: var(--surface); border: 1px solid var(--border); padding: 2rem; margin-bottom: 1.5px; }
  .tip-row { display: flex; gap: 1.25rem; padding: 1rem 0; border-bottom: 1px solid var(--border); }
  .tip-row:last-child { border-bottom: none; padding-bottom: 0; }
  .tip-num { font-family: var(--serif); font-size: 1.4rem; font-weight: 900; color: var(--accent); line-height: 1; flex-shrink: 0; width: 24px; }
  .tip-text { font-size: .85rem; color: #b0b0c8; line-height: 1.7; }

  .p-grid-card { background: var(--surface); border: 1px solid var(--border); padding: 1.5rem 2rem; }
  .p-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5px; margin-top: 1rem; }
  .p-tile { background: var(--bg); border: 1px solid var(--border); padding: 1.25rem; transition: border-color .2s; }
  .p-tile.current { border-color: var(--accent); }
  .p-tile-icon { font-size: 1.4rem; margin-bottom: .4rem; display: block; }
  .p-tile-name { font-size: .72rem; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); }
  .p-tile.current .p-tile-name { color: var(--accent); }

  .state-block { background: var(--surface); border: 1px solid var(--border); padding: 5rem 2rem; text-align: center; }
  .state-icon { font-size: 2.5rem; display: block; margin-bottom: 1rem; animation: pulse 1.4s infinite; }
  @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.08); } }
  .state-title { font-family: var(--serif); font-size: 1.4rem; font-weight: 900; margin-bottom: .5rem; }
  .state-sub { color: var(--muted); font-size: .82rem; }
  .empty-block { background: var(--surface); border: 1px solid var(--border); padding: 4rem 2rem; text-align: center; color: var(--muted); font-size: .82rem; }
  .empty-icon { font-size: 2rem; display: block; margin-bottom: .75rem; opacity: .4; }

  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.75);
    z-index: 200; align-items: center; justify-content: center; backdrop-filter: blur(6px);
  }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); padding: 2.5rem; max-width: 380px; width: 90%; }
  .modal-label { font-size: .65rem; letter-spacing: .15em; text-transform: uppercase; color: var(--muted); margin-bottom: .6rem; }
  .modal-title { font-family: var(--serif); font-size: 1.4rem; font-weight: 900; margin-bottom: .5rem; }
  .modal-body { color: var(--muted); font-size: .82rem; margin-bottom: 2rem; }
  .modal-actions { display: flex; gap: 1rem; }
  .modal-cancel {
    flex: 1; padding: .65rem; background: none; border: 1px solid var(--border);
    color: var(--muted); font-family: var(--mono); font-size: .75rem; cursor: pointer;
    letter-spacing: .08em; transition: border-color .2s, color .2s;
  }
  .modal-cancel:hover { border-color: var(--text); color: var(--text); }
  .modal-confirm {
    flex: 1; padding: .65rem; background: none; border: 1px solid var(--accent2);
    color: var(--accent2); font-family: var(--mono); font-size: .75rem;
    cursor: pointer; letter-spacing: .08em; font-weight: 600; transition: background .2s;
  }
  .modal-confirm:hover { background: rgba(255,107,107,.1); }

  #toast {
    position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
    padding: .6rem 1.5rem; font-size: .75rem; letter-spacing: .1em; text-transform: uppercase;
    z-index: 999; opacity: 0; pointer-events: none; transition: opacity .25s;
    white-space: nowrap; border-radius: 2px;
  }
  #toast.show { opacity: 1; }
  #toast.success { background: var(--accent); color: #000; }
  #toast.error   { background: var(--accent2); color: #fff; }

  footer {
    text-align: center; padding: 2rem; border-top: 1px solid var(--border);
    color: var(--muted); font-size: .7rem; letter-spacing: .1em;
  }
  footer span { color: var(--accent); }

  select.form-input option { background: var(--surface); }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); }
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="#">Expense<span>.log</span></a>
  <div class="nav-links">
    <button class="nav-tab active" onclick="switchView('dashboard')">Dashboard</button>
    <button class="nav-tab" onclick="switchView('personality')">Analyze</button>
    <button class="btn-new" onclick="switchView('add')">+ New Entry</button>
  </div>
</nav>

<main>
  <div class="page-header">
    <div>
      <h1>Spending <em>Record</em></h1>
      <p id="tx-count">— transactions tracked</p>
    </div>
    <div>
      <div class="header-total-label">Total Spent</div>
      <div class="header-total-amount" id="totalAmount">$0.00</div>
    </div>
  </div>

  <div id="view-dashboard" class="view active">
    <div class="section-label">Breakdown by Category</div>
    <div class="breakdown-list" id="breakdown-list"></div>
    <div class="section-label" style="margin-top:2.5rem">Transactions</div>
    <div class="filter-row" id="filter-row">
      <button class="chip active" onclick="setFilter('All',this)">All</button>
    </div>
    <div class="tx-list" id="tx-list"></div>
  </div>

  <div id="view-add" class="view">
    <div class="form-card">
      <h2>New <em>Entry</em></h2>
      <div class="form-group">
        <label>Description</label>
        <input class="form-input" id="f-desc" type="text" placeholder="What did you spend on?">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Amount ($)</label>
          <input class="form-input" id="f-amount" type="number" placeholder="0.00" min="0.01" step="0.01">
        </div>
        <div class="form-group">
          <label>Date</label>
          <input class="form-input" id="f-date" type="date">
        </div>
      </div>
      <div class="form-group">
        <label>Category</label>
        <div class="cat-grid" id="cat-grid"></div>
      </div>
      <div class="form-actions">
        <button class="btn-submit" onclick="submitExpense()">Save Entry</button>
        <button class="btn-cancel" onclick="switchView('dashboard')">Cancel</button>
      </div>
    </div>
  </div>

  <div id="view-personality" class="view">
    <div id="personality-content"></div>
  </div>
</main>

<footer>
  Built with <span>Python</span> &amp; stdlib &nbsp;·&nbsp; Expense Tracker Portfolio
</footer>

<div class="modal-overlay" id="del-modal">
  <div class="modal">
    <div class="modal-label">Confirm Action</div>
    <div class="modal-title">Delete entry?</div>
    <div class="modal-body">This transaction will be permanently removed from your records.</div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal()">Cancel</button>
      <button class="modal-confirm" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const API = '';
const CATS = ["Food","Transport","Shopping","Entertainment","Health","Bills","Other"];
const EMOJIS = {Food:"🍜",Transport:"🚗",Shopping:"🛍️",Entertainment:"🎬",Health:"💊",Bills:"⚡",Other:"📦"};
let activeFilter = 'All', selectedCat = 'Food', pendingDeleteId = null;

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
  const grid = document.getElementById('cat-grid');
  CATS.forEach(c => {
    const b = document.createElement('button');
    b.className = 'cat-btn' + (c === 'Food' ? ' selected' : '');
    b.textContent = EMOJIS[c] + ' ' + c;
    b.onclick = () => { selectedCat = c; document.querySelectorAll('.cat-btn').forEach(x => x.classList.remove('selected')); b.classList.add('selected'); };
    grid.appendChild(b);
  });
  const fr = document.getElementById('filter-row');
  CATS.forEach(c => {
    const b = document.createElement('button');
    b.className = 'chip';
    b.textContent = EMOJIS[c] + ' ' + c;
    b.onclick = () => setFilter(c, b);
    fr.appendChild(b);
  });
  loadDashboard();
});

function switchView(view) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
  document.getElementById('view-' + view).classList.add('active');
  const idx = ['dashboard','personality'].indexOf(view);
  if (idx >= 0) document.querySelectorAll('.nav-tab')[idx].classList.add('active');
  if (view === 'personality') loadPersonality();
  if (view === 'dashboard') loadDashboard();
}

async function apiFetch(path, opts = {}) {
  const r = await fetch(API + path, { headers: { 'Content-Type': 'application/json' }, ...opts });
  return r.json();
}

async function loadDashboard() {
  const [summary, expenses] = await Promise.all([apiFetch('/api/summary'), apiFetch('/api/expenses?limit=50')]);
  document.getElementById('totalAmount').textContent = '$' + summary.total.toFixed(2);
  document.getElementById('tx-count').textContent = summary.count + ' transaction' + (summary.count !== 1 ? 's' : '') + ' tracked';
  const bList = document.getElementById('breakdown-list');
  const breakdown = summary.breakdown || {};
  const total = summary.total || 1;
  const sorted = Object.entries(breakdown).sort((a, b) => b[1] - a[1]);
  if (sorted.length === 0) {
    bList.innerHTML = '<div class="empty-block"><span class="empty-icon">📊</span>No data yet. Add your first entry.</div>';
  } else {
    bList.innerHTML = sorted.map(([cat, amt]) => {
      const pct = Math.round(amt / total * 100);
      return `<div class="breakdown-row">
        <span class="breakdown-cat cat-${cat}">${EMOJIS[cat]||''} ${cat}</span>
        <div class="breakdown-bar-wrap"><div class="breakdown-bar bar-${cat}" data-pct="${pct}" style="width:0"></div></div>
        <span class="breakdown-pct">${pct}%</span>
        <span class="breakdown-amt">$${amt.toFixed(2)}</span>
      </div>`;
    }).join('');
    requestAnimationFrame(() => document.querySelectorAll('.breakdown-bar').forEach(b => b.style.width = b.dataset.pct + '%'));
  }
  renderTransactions(expenses);
}

function renderTransactions(expenses) {
  const filtered = activeFilter === 'All' ? expenses : expenses.filter(e => e.category === activeFilter);
  const list = document.getElementById('tx-list');
  if (filtered.length === 0) { list.innerHTML = '<div class="empty-block"><span class="empty-icon">🧾</span>No transactions found.</div>'; return; }
  list.innerHTML = filtered.map(e => `
    <div class="tx-row">
      <span class="tx-emoji">${EMOJIS[e.category]||'📦'}</span>
      <div class="tx-info">
        <div class="tx-desc">${escHtml(e.description)}</div>
        <div class="tx-meta cat-${e.category}">${e.category}</div>
      </div>
      <div class="tx-right">
        <div class="tx-amount">$${e.amount.toFixed(2)}</div>
        <div class="tx-date">${fmtDate(e.date)}</div>
      </div>
      <button class="del-btn" onclick="askDelete(${e.id})">remove</button>
    </div>`).join('');
}

async function setFilter(cat, btn) {
  activeFilter = cat;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  renderTransactions(await apiFetch('/api/expenses?limit=50'));
}

async function submitExpense() {
  const desc = document.getElementById('f-desc').value.trim();
  const amount = parseFloat(document.getElementById('f-amount').value);
  const date = document.getElementById('f-date').value;
  if (!desc) { showToast('Description required', 'error'); return; }
  if (!amount || amount <= 0) { showToast('Enter a valid amount', 'error'); return; }
  if (!date) { showToast('Pick a date', 'error'); return; }
  const res = await apiFetch('/api/expenses', { method: 'POST', body: JSON.stringify({ description: desc, amount, category: selectedCat, date }) });
  if (res.ok) { showToast('Entry saved'); document.getElementById('f-desc').value = ''; document.getElementById('f-amount').value = ''; switchView('dashboard'); }
  else showToast(res.error || 'Error saving', 'error');
}

function askDelete(id) { pendingDeleteId = id; document.getElementById('del-modal').classList.add('open'); }
function closeModal() { pendingDeleteId = null; document.getElementById('del-modal').classList.remove('open'); }
async function confirmDelete() {
  if (!pendingDeleteId) return;
  const res = await apiFetch('/api/expenses/' + pendingDeleteId, { method: 'DELETE' });
  closeModal();
  if (res.ok) { showToast('Entry removed'); loadDashboard(); }
  else showToast('Could not delete', 'error');
}
document.getElementById('del-modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });

const P_ACCENT = { strategic:'#00e5cc', lifestyle:'#ff6b9d', impulse:'#ffa62b', hunter:'#c084fc' };
const ALL_P = { strategic:{icon:'🧠',title:'Strategic Saver'}, lifestyle:{icon:'🎉',title:'Lifestyle Spender'}, impulse:{icon:'⚡',title:'Impulse Buyer'}, hunter:{icon:'🛒',title:'Deal Hunter'} };

async function loadPersonality() {
  const el = document.getElementById('personality-content');
  el.innerHTML = `<div class="state-block"><span class="state-icon">🧠</span><div class="state-title">Analyzing patterns…</div><div class="state-sub">Reading your transaction history</div></div>`;
  const data = await apiFetch('/api/personality');
  if (data.error === 'insufficient_data') {
    el.innerHTML = `<div class="state-block"><span class="state-icon" style="animation:none">📊</span><div class="state-title">Not enough data</div><div class="state-sub">Add at least 3 entries to unlock your spending personality. You have ${data.count}.</div></div>`;
    return;
  }
  const { key, report, ai } = data;
  const accent = P_ACCENT[key] || 'var(--accent)';
  const tips = ai?.tips || report.advice || [];
  el.innerHTML = `
    <div class="p-header">
      <span class="p-tag">Spending Personality</span>
      <span class="p-icon">${report.icon}</span>
      <div class="p-title">${report.title}</div>
      <div class="p-desc">${report.description}</div>
      <div class="p-traits">${report.traits.map(t=>`<span class="p-trait" style="border-color:${accent};color:${accent};background:${accent}12">${t}</span>`).join('')}</div>
    </div>
    ${ai?.insight ? `<div class="insight-card"><div class="insight-label">✦ AI Insight</div><div class="insight-text">"${escHtml(ai.insight)}"</div></div>` : ''}
    <div class="tips-card">
      <div class="section-label">Action Plan</div>
      ${tips.map((t,i)=>`<div class="tip-row"><span class="tip-num" style="color:${accent}">${i+1}</span><span class="tip-text">${escHtml(t)}</span></div>`).join('')}
    </div>
    <div class="p-grid-card">
      <div class="section-label">All Spending Types</div>
      <div class="p-grid">${Object.entries(ALL_P).map(([k,v])=>`<div class="p-tile ${k===key?'current':''}"><span class="p-tile-icon">${v.icon}</span><div class="p-tile-name">${v.title}</div></div>`).join('')}</div>
    </div>`;
}

function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'show ' + type;
  setTimeout(() => t.className = '', 2800);
}
function fmtDate(str) { return new Date(str + 'T00:00:00').toLocaleDateString('en-US', { month:'short', day:'numeric' }); }
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
</script>
